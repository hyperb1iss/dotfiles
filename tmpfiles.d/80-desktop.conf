# Transparent Huge Pages: switch from "always" to "madvise"
#
# With THP=always, the kernel aggressively defragments memory into
# 2MB huge pages for every process. Under memory pressure, khugepaged
# compaction causes 10-100ms latency stalls — the exact jank pattern
# visible as window drag hitches and compositor micro-freezes.
#
# madvise: only processes that explicitly opt in via madvise(MADV_HUGEPAGE)
# get THP (VMs, databases, JVMs). Everything else uses standard 4KB pages.
#
# Phoronix 6.18 LTS benchmarks confirm madvise is within measurement noise
# of always for throughput, without the tail latency spikes.
# Ref: https://www.phoronix.com/review/thp-madvise-always
#
# CachyOS defaults to "always"; Fedora and Ubuntu default to "madvise".
w /sys/kernel/mm/transparent_hugepage/enabled - - - - madvise
