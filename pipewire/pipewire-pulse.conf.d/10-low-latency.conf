# Match low-latency settings for PulseAudio-compat clients
#
# Without this, PA clients (Firefox, Electron apps, etc.) request
# their own buffer sizes — often 2048+ samples — which forces
# PipeWire to run the entire graph at higher latency.
#
# Setting req/frag to match the PipeWire quantum keeps everything
# aligned at 256 samples / ~5.3ms @ 48kHz.
pulse.properties = {
    pulse.min.req      = 256/48000
    pulse.default.req  = 256/48000
    pulse.min.frag     = 256/48000
    pulse.default.frag = 256/48000
}
