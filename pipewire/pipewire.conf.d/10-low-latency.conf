# Production audio: low-latency PipeWire configuration
#
# Default quantum 1024 @ 48kHz = ~21.3ms round-trip — fine for
# desktop playback, unusable for live monitoring or recording.
#
# quantum 256 @ 48kHz = ~5.3ms — solid baseline for production.
# JACK clients can request down to min-quantum 32 (~0.67ms @ 48kHz)
# and PipeWire dynamically adjusts the graph.
#
# Multi-rate support: allowed-rates lets the graph switch sample
# rates without resampling when a client or device requests it.
# 96kHz with quantum 256 = ~2.7ms for high-res sessions.
#
# Hardware: USB Audio, Ableton Push 2, ROLI LUMI Keys
context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 88200 96000 ]
    default.clock.quantum       = 256
    default.clock.min-quantum   = 32
    default.clock.max-quantum   = 2048
}
