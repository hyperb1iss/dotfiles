- defaults:
    link:
      relink: true
      force: true

- clean: ["~"]

- shell:
    - if [ -d ~/dev/dotfiles-private ]; then ln -sf ~/dev/dotfiles-private/fonts/Pragmata\ Pro fonts/;fi

- link:
    ~/.bashrc.local: bash/bashrc.local
    ~/.config/lsd: lsd
    ~/.config/bat: bat
    ~/.fonts:
    ~/.gitconfig:
    ~/.tmux.conf:
    ~/.dircolors:
    ~/.zshrc: zsh/zshrc
    ~/.config/nvim: nvim
    ~/bin: bin

- shell:
    - command: bat cache --build
      description: "Rebuilding bat theme cache"
      stdout: true

- shell:
    - fc-cache -f

- shell:
    - curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
    - chmod +x ~/bin/repo

- shell:
    - command: |
        # Install Rust toolchain and CLI tools
        rustup toolchain install stable
        # Add cargo to PATH (apt rustup doesn't create ~/.cargo/env)
        export PATH="$HOME/.cargo/bin:$PATH"
        if command -v cargo &> /dev/null; then
          echo "📦 Installing Rust CLI tools from cargo-tools.txt..."
          grep -v '^#\|^$' cargo-tools.txt | sed 's/#.*//' | xargs cargo install
        fi
      stderr: true
      stdout: true
      description: "Installing Rust toolchain + CLI tools"

- shell:
    - mkdir -p ~/.config/fastfetch
- link:
    ~/.config/fastfetch/config.jsonc: fastfetch/config.jsonc

- shell:
    - mkdir -p ~/.tmux/plugins
- link:
    ~/.tmux/plugins/tpm: tpm

- shell:
    - mkdir -p ~/.config/procs
- link:
    ~/.config/procs/config.toml: procs/config.toml

- shell:
    - mkdir -p ~/.config/starship
- link:
    ~/.config/starship.toml: starship/starship.toml

- shell:
    - command: |
        # Only create Ghostty macOS config dir on macOS
        if [ "$(uname)" = "Darwin" ]; then
          mkdir -p "$HOME/Library/Application Support/com.mitchellh.ghostty"
        fi
      quiet: true
- link:
    ~/Library/Application Support/com.mitchellh.ghostty/config:
      path: ghostty/config
      if: '[ "$(uname)" = "Darwin" ]'

- shell:
    - command: |
        # Install fzf - prefer package manager, fall back to go install
        if command -v fzf >/dev/null 2>&1; then
          echo "fzf already installed"
        elif command -v go >/dev/null 2>&1; then
          mkdir -p ~/dev/go && GOPATH=~/dev/go go install github.com/junegunn/fzf@latest
        else
          echo "Warning: fzf not found and go not available, skipping fzf install"
        fi
      stderr: true
      stdout: true
      description: Installing fzf

- shell:
    - command: |
        # Install proto version manager if not present
        if ! command -v proto &> /dev/null; then
          echo "✨ Installing proto version manager..."
          curl -fsSL https://moonrepo.dev/install/proto.sh | bash -s -- --yes
          export PROTO_HOME="$HOME/.proto"
          export PATH="$PROTO_HOME/shims:$PROTO_HOME/bin:$PATH"
        fi
        # Install node and npm via proto
        if command -v proto &> /dev/null; then
          echo "📦 Setting up node and npm via proto..."
          proto install node lts
          proto install npm
          # Pin versions globally (writes to ~/.prototools)
          proto pin node lts
          proto pin npm bundled
        fi
      stderr: true
      stdout: true
      description: "Installing proto + node/npm"

- shell:
    - mkdir -p ~/.claude
- link:
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/statusline-command.sh: claude/statusline-command.sh

- shell:
    - mkdir -p ~/.config/atuin/themes
- link:
    ~/.config/atuin/config.toml: atuin/config.toml
    ~/.config/atuin/themes/silkcircuit.toml: atuin/themes/silkcircuit.toml

- shell:
    - mkdir -p ~/.config/fontconfig
    - mkdir -p ~/.config/ghostty
- link:
    ~/.config/fontconfig/fonts.conf: fonts/fonts.conf
    ~/.config/ghostty/config: ghostty/config
    ~/.config/ghostty/linux.conf: ghostty/linux.conf

- shell:
    - description: Link host-specific Ghostty config
      command: |
        if [ "$(hostname)" = "hyperia" ] && [ -f ghostty/hyperia.conf ]; then
          ln -sf "$(pwd)/ghostty/hyperia.conf" ~/.config/ghostty/hyperia.conf
        fi

- shell:
    - mkdir -p ~/.proto
- link:
    ~/.proto/.prototools: proto/.prototools

- shell:
    - mkdir -p ~/.config/GIMP/3.2/palettes
- link:
    ~/.config/GIMP/3.2/gimprc: gimp/gimprc
    ~/.config/GIMP/3.2/palettes/SilkCircuit.gpl: gimp/palettes/SilkCircuit.gpl

- shell:
    - mkdir -p ~/.config/blender/5.0/scripts/startup
- link:
    ~/.config/blender/5.0/scripts/startup/print3d_defaults.py: blender/startup/print3d_defaults.py

- shell:
    - mkdir -p ~/.config/ignis/modules
    - mkdir -p ~/.config/systemd/user
- link:
    ~/.config/ignis/config.py: ignis/config.py
    ~/.config/ignis/style.scss: ignis/style.scss
    ~/.config/ignis/modules/__init__.py: ignis/modules/__init__.py
    ~/.config/ignis/modules/clock.py: ignis/modules/clock.py
    ~/.config/ignis/modules/weather.py: ignis/modules/weather.py
    ~/.config/ignis/modules/sysmon.py: ignis/modules/sysmon.py
    ~/.config/ignis/modules/media.py: ignis/modules/media.py
    ~/.config/systemd/user/ignis.service: ignis/ignis.service
- shell:
    - command: |
        # Enable Ignis desktop widgets on login
        if command -v ignis >/dev/null 2>&1; then
          systemctl --user daemon-reload
          systemctl --user enable ignis.service 2>/dev/null || true
          echo "Ignis desktop widgets enabled"
        else
          echo "Ignis not installed — run: paru -S python-ignis"
        fi
      stdout: true
      description: "Enabling Ignis desktop widgets"

- shell:
    - mkdir -p ~/.config/containers
- link:
    ~/.config/containers/storage.conf: containers/storage.conf
    ~/.config/containers/containers.conf: containers/containers.conf

- shell:
    - command: |
        # Enable rootless Podman socket for Docker Compose compatibility
        if command -v podman >/dev/null 2>&1; then
          systemctl --user enable --now podman.socket 2>/dev/null || true
          echo "Podman socket enabled at $XDG_RUNTIME_DIR/podman/podman.sock"
        fi
      stderr: true
      stdout: true
      description: "Enabling rootless Podman socket"
