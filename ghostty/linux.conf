# ─────────────────────────────────────────────────────────────────────────────
# Linux Font Overrides — Nerd Font variant names
# ─────────────────────────────────────────────────────────────────────────────
font-family = PragmataProMonoLiga Nerd Font Mono
font-family-bold = PragmataProMonoLiga Nerd Font Mono
font-family-italic = PragmataProMonoLiga Nerd Font Mono
font-family-bold-italic = PragmataProMonoLiga Nerd Font Mono

# ─────────────────────────────────────────────────────────────────────────────
# GTK Chrome — SilkCircuit titlebar & tabs
# ─────────────────────────────────────────────────────────────────────────────
# window-theme = dark is set in main config; gives us a solid opaque
# headerbar that doesn't bleed with background-opacity. CSS handles colors.
gtk-titlebar = true
gtk-titlebar-style = tabs
gtk-toolbar-style = flat
gtk-wide-tabs = true
gtk-custom-css = ~/.config/ghostty/silkcircuit.css
