# Desktop interactivity: writeback tuning for CachyOS (NVMe)
#
# Complements CachyOS defaults in /usr/lib/sysctl.d/70-cachyos-settings.conf
# which already handles: page-cluster=0, dirty_bytes=256MB,
# dirty_background_bytes=64MB, vfs_cache_pressure=50, split_lock_mitigate=0.
#
# This file tunes the *timing* of writeback to prevent bursty I/O that
# can stall the compositor under sustained write loads.

# Expire dirty pages after 15s (kernel default 30s).
# Halves the max age of dirty data so the flusher has less work per cycle.
vm.dirty_expire_centisecs = 1500

# Wake the flusher thread every 5s (CachyOS default 15s, kernel default 5s).
# CachyOS raised this to reduce flusher overhead, but on a 20-core i7-14700K
# with NVMe, flusher wakeups are negligible. More frequent checks = smaller
# write batches = smoother I/O during compositor-intensive workloads.
vm.dirty_writeback_centisecs = 500
