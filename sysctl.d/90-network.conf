# TCP congestion: BBR outperforms CUBIC on consumer connections
# (lower latency, better throughput, bufferbloat resistance)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# TCP Fast Open: client + server (saves a round-trip on repeat connections)
net.ipv4.tcp_fastopen = 3

# Don't reset congestion window after idle — desktop traffic is bursty
net.ipv4.tcp_slow_start_after_idle = 0

# Discover max MTU along path (helps with jumbo frames on LAN)
net.ipv4.tcp_mtu_probing = 1

# Buffer sizes: 16MB max for 64GB RAM desktop with fast internet
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 131072 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
