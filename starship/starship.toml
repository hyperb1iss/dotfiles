# SilkCircuit theme for Starship

# Background:       #1a1a2e  (deep space purple)
# Segment 1:        #4a1a4a  (deep magenta) 
# Segment 2:        #7a2d7a  (royal purple-pink)
# Segment 3:        #a040a0  (electric magenta)
# Segment 4:        #d060d0  (hot pink)
# Segment 5:        #ff69b4  (cyberpunk pink)

format = """
[оӮ¶](bg:#1a1a2e fg:#4a1a4a)\
$os\
$username\
$hostname\
[ ](bold bg:#4a1a4a)\
[оӮ°](bg:#7a2d7a fg:#4a1a4a)\
$directory\
[оӮ°](bg:#a040a0 fg:#7a2d7a)\
$git_branch\
$git_status\
[оӮ°](bg:#d060d0 fg:#a040a0)\
$python\
$docker_context\
$kubernetes\
[оӮ°](bg:#ff69b4 fg:#d060d0)\
[оӮ°](bg:#1a1a2e fg:#ff69b4)\
[вһӨ](bold fg:#ff69b4) \
"""

# Disable the blank line at the start of the prompt
add_newline = false

# OS module with enhanced foreground color
[os]
format = '[ $symbol]($style)'
style = "bold fg:#FF99FF bg:#4a1a4a"
disabled = false

[os.symbols]
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "пҢғ"
CachyOS = "пҢғ"
CentOS = "пҢ„"
Debian = "пҢҶ"
DragonFly = "рҹҗү"
Emscripten = "рҹ”—"
EndeavourOS = "пҢў"
Fedora = "пҢҠ"
FreeBSD = "пҢҢ"
Garuda = "п…ј"
Gentoo = "пҢҚ"
HardenedBSD = "пҰ—"
Illumos = "рҹҗҰ"
Linux = "п…ј"
Macos = "пҢӮ"
Manjaro = "пҢ’"
Mariner = "п…ј"
MidnightBSD = "рҹҢҳ"
Mint = "пҢҺ"
NetBSD = "п…ј"
NixOS = "пҢ“"
OpenBSD = "пҢЁ"
OpenCloudOS = "вҳҒпёҸ"
openEuler = "п…ј"
openSUSE = "пҢ”"
OracleLinux = "вҠӮвҠғ"
Pop = "пҢӘ"
Raspbian = "пҢ•"
Redhat = "пҢ–"
RedHatEnterprise = "пҢ–"
Redox = "рҹ§Ә"
Solus = "пҢӯ"
SUSE = "пҢ”"
Ubuntu = "пҢӣ"
Unknown = "п„Ҳ"
Windows = "оңҸ"

# Username module with enhanced foreground color
[username]
style_user = "bold fg:#FF99FF bg:#4a1a4a"
style_root = "bold fg:#FF4444 bg:#4a1a4a"
format = '[ $user]($style)'
disabled = false
show_always = true


# Hostname configuration for SSH awareness
[hostname]
style = "bold fg:#FF66FF bg:#4a1a4a"
ssh_only = true
format = '[@$hostname]($style)'
trim_at = "."
disabled = false

# Directory module with enhanced foreground color
[directory]
truncation_length = 3
truncation_symbol = "вҖҰ/"
style = "bold fg:#FF99CC bg:#7a2d7a"
format = "[ $path ]($style)"

# Git branch module with enhanced foreground color
[git_branch]
symbol = "оӮ  "
style = "bold fg:#FF99FF bg:#a040a0"
format = "[ $symbol$branch ]($style)"

# Git status module with enhanced foreground color
[git_status]
style = "bold fg:#FF99FF bg:#a040a0"
format = "[$all_status]($style)"

# Node.js module with enhanced foreground color
[nodejs]
symbol = "оңҳ "
style = "bold fg:#FFEEFF bg:#d060d0"
format = "[ $symbol($version) ]($style)"
disabled = true

# Python module with enhanced foreground color
[python]
symbol = "оҳҶ "
style = "bold fg:#FFEEFF bg:#d060d0"
format = '([ $symbol($virtualenv) ]($style))'
detect_extensions = ["py"]
detect_files = [
  "requirements.txt",
  "pyproject.toml",
  "Pipfile",
  "tox.ini",
  "setup.py",
]
disabled = false

# Rust module
[rust]
symbol = "уұҳ— "
style = "bold fg:#FFEEFF bg:#d060d0"
format = "[ $symbol($version) ]($style)"
disabled = true

# Go module
[golang]
symbol = "у°ҹ“ "
style = "bold fg:#FFEEFF bg:#d060d0"
format = "[ $symbol($version) ]($style)"
disabled = true

# Java module
[java]
symbol = "у°¬· "
style = "bold fg:#FFEEFF bg:#d060d0"
format = "[ $symbol($version) ]($style)"
disabled = true

# Kotlin module
[kotlin]
symbol = "уұҲҷ "
style = "bold fg:#FFEEFF bg:#d060d0"
format = "[ $symbol($version) ]($style)"
disabled = true

# Gradle module
[gradle]
symbol = "уұҺҗ "
style = "bold fg:#FFEEFF bg:#d060d0"
format = "[ $symbol($version) ]($style)"
disabled = true

# C module
[c]
symbol = "у°ҷұ "
style = "bold fg:#FFEEFF bg:#d060d0"
format = "[ $symbol($version) ]($style)"
disabled = true

# Lua module
[lua]
symbol = "у°ўұ "
style = "bold fg:#FFEEFF bg:#d060d0"
format = "[ $symbol($version) ]($style)"
disabled = true

# Docker context
[docker_context]
symbol = "у°ЎЁ "
style = "bold fg:#FFEEFF bg:#d060d0"
format = "[ $symbol$context ]($style)"
disabled = false

# Kubernetes context вҖ” shouts when on prod
[kubernetes]
symbol = "уұғҫ "
format = "[ $symbol$context ]($style)"
style = "bold fg:#FFEEFF bg:#d060d0"
disabled = false
contexts = [
  { context_pattern = ".*[Pp][Rr][Oo][Dd].*", context_alias = "PROD", style = "bold fg:#1a1a2e bg:#ffcc00", symbol = "пҒұ " },
  # EKS contexts вҖ” strip region (e.g., eks-us-west-2-int вҶ’ eks-int)
  { context_pattern = "eks-[a-z]+-[a-z]+-\\d+-(?P<env>.*)", context_alias = "eks-$env", style = "bold fg:#FFEEFF bg:#d060d0" },
  # Fallback
  { context_pattern = ".*", style = "bold fg:#FFEEFF bg:#d060d0" }
]

# Time
[time]
disabled = true
format = 'уұ‘Қ [\[ $time \]]($style) '
time_format = "%T"

# Command duration
[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "bold fg:#FF6666"

# Battery
[battery]
full_symbol = "у°Ғ№ "
charging_symbol = "у°Ӯ„ "
discharging_symbol = "у°Ӯғ "
unknown_symbol = "у°ҒҪ "
empty_symbol = "у°ӮҺ "
disabled = false

[[battery.display]]
threshold = 10
style = "bold red"

# Package version
[package]
symbol = "у°Ҹ— "
style = "bold fg:#FF6666"
disabled = true

# Shell indicator
[shell]
fish_indicator = "у°Ҳә "
powershell_indicator = "у°ЁҠ "
bash_indicator = "уұҶғ "
zsh_indicator = "уұҗӢ "
unknown_indicator = "у°ҖЈ "
style = "cyan bold"
disabled = true
